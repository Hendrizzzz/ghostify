name: Share feedback
description: Share feedback that does not fit the bug or idea forms.
title: "[Feedback]: "
labels: ["feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to help shape Ghostify. Short, specific feedback is easiest to act on.
        Do not include private messages, credentials, or account-sensitive details.
  - type: dropdown
    id: topic
    attributes:
      label: What is this about?
      options:
        - Something confusing in the popup
        - Website or docs feedback
        - Privacy or trust concern
        - Other feedback
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Pick the closest match if this is platform-specific.
      options:
        - Not platform-specific
        - Facebook
        - Messenger
        - Instagram
        - Multiple platforms
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: What would you like to share?
      placeholder: "Example: The Hide Seen note helped, but I was not sure whether refreshing was required."
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Optional, but useful if this involves a specific page, browser, or setting.
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        **Thank-you credit preview:** Helpful feedback can be credited in Ghostify release notes and on the website.
  - type: dropdown
    id: public-thanks
    attributes:
      label: Can we thank you publicly if this helps Ghostify?
      description: Yes means we can credit your GitHub name and avatar in release notes and on the Ghostify website.
      options:
        - Yes, name and avatar
        - No thanks
    validations:
      required: true
