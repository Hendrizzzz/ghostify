name: Help & feedback
description: Report a bug, share an idea, ask a question, or send feedback.
title: "[Help & feedback]: "
labels: ["feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Ghostify. This guided form keeps the details clear without making you start from scratch.
        Do not include private messages, credentials, or account-sensitive details in reports, screenshots, or recordings.
  - type: dropdown
    id: request-type
    attributes:
      label: What would you like to do?
      options:
        - Report a bug
        - Share an idea
        - Share feedback
        - Ask a question
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Pick the closest match.
      options:
        - Not platform-specific
        - Facebook
        - Messenger
        - Instagram
        - Multiple platforms
    validations:
      required: true
  - type: dropdown
    id: feature
    attributes:
      label: Area
      description: Pick the closest match.
      options:
        - Hide Seen
        - Hide Typing
        - Hide Story Views
        - Message Requests
        - Popup UI
        - Website or docs
        - Privacy or trust
        - Other
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Tell us what happened, what you expected, your idea, or your question.
      placeholder: "Example: On facebook.com, I clicked New message requests and it opened a blank chat page instead of the request list. I expected Ghostify to keep the real UI working while Seen stays blocked."
    validations:
      required: true
  - type: textarea
    id: steps-or-context
    attributes:
      label: Steps or context
      description: Optional, but useful for bugs. Numbered steps, screenshots, browser, and Ghostify version help a lot.
      placeholder: |
        1. Go to facebook.com
        2. Open Messenger
        3. Click ...
    validations:
      required: false
  - type: textarea
    id: attachments
    attributes:
      label: Screenshots or screen recording links
      description: Optional. Drag screenshots or a short video into the GitHub comment box after creating the issue, or paste a safe link here. Remove private messages, credentials, and account-sensitive details first.
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        **Thank-you credit preview:** Helpful bugs, ideas, feedback, and questions can be credited in Ghostify release notes and on the website.
  - type: dropdown
    id: public-thanks
    attributes:
      label: Can we thank you publicly if this helps Ghostify?
      description: Yes means we can credit your GitHub name and avatar in release notes and on the Ghostify website.
      options:
        - Yes, name and avatar
        - No thanks
    validations:
      required: true
