name: Report a bug
description: Tell us when a Ghostify control, platform flow, or popup state is not working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping keep Ghostify reliable. Clear reports make fixes much faster.
        Do not include private messages, credentials, or account-sensitive details in reports, screenshots, or recordings.
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Where did this happen?
      options:
        - Facebook
        - Messenger
        - Instagram
        - Multiple platforms
    validations:
      required: true
  - type: dropdown
    id: feature
    attributes:
      label: Feature affected
      options:
        - Hide Seen
        - Hide Typing
        - Hide Story Views
        - Message Requests
        - Platform changed UI or behavior
        - Popup UI
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Tell us what you saw.
      placeholder: "Example: I clicked New message requests on facebook.com and the request list did not open."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: "Example: Message requests should open without sending Seen."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps are best.
      placeholder: |
        1. Go to facebook.com
        2. Open Messenger
        3. Click ...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome 125, Edge 125, Opera GX, etc.
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: Ghostify version
      placeholder: "Example: v2.0.1"
    validations:
      required: true
  - type: textarea
    id: attachments
    attributes:
      label: Screenshots or screen recording links
      description: Optional. Drag screenshots or a short video into the GitHub comment box after creating the issue, or paste a safe link here. Remove private messages, credentials, and account-sensitive details first.
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        **Thank-you credit preview:** Helpful confirmed reports can be credited in Ghostify release notes and on the website.
  - type: dropdown
    id: public-thanks
    attributes:
      label: Can we thank you publicly if this helps Ghostify?
      description: Yes means we can credit your GitHub name and avatar in release notes and on the Ghostify website.
      options:
        - Yes, name and avatar
        - No thanks
    validations:
      required: true
