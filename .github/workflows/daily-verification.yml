name: Daily verification PR

on:
  schedule:
    - cron: "15 0 * * *"
  push:
    branches: [main]
    paths:
      - "site/src/app/statusData.json"
  workflow_dispatch:
    inputs:
      mode:
        description: Status update to propose
        required: true
        type: choice
        default: verified
        options:
          - verified
          - reported
          - in-progress
          - known-issue
      features:
        description: Comma-separated feature ids for a yellow update
        required: false
        type: string
      issue_url:
        description: Optional Ghostify GitHub issue URL
        required: false
        type: string
      note:
        description: Public, privacy-safe status description
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: public-status-pr
  cancel-in-progress: false

jobs:
  validate-proposal:
    name: Validate public status proposal
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      ready: ${{ steps.proposal.outputs.ready }}
      today: ${{ steps.proposal.outputs.today }}
      generated_at: ${{ steps.proposal.outputs.generated_at }}
      base_sha: ${{ steps.proposal.outputs.base_sha }}
      branch: ${{ steps.proposal.outputs.branch }}
      title: ${{ steps.proposal.outputs.title }}
      target_version: ${{ steps.proposal.outputs.target_version }}
      verification_version: ${{ steps.proposal.outputs.verification_version }}
      base_status: ${{ steps.proposal.outputs.base_status }}
    env:
      MODE: ${{ github.event.inputs.mode || 'verified' }}
      FEATURES: ${{ github.event.inputs.features || '' }}
      ISSUE_URL: ${{ github.event.inputs.issue_url || '' }}
      NOTE: ${{ github.event.inputs.note || '' }}
      DAILY_BRANCH: chore/status-daily-verification

    steps:
      - name: Check out main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: |
            package-lock.json
            site/package-lock.json

      - name: Define proposal
        id: proposal
        shell: bash
        run: |
          today="$(date -u +%F)"
          generated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          base_sha="$(git rev-parse HEAD)"
          TODAY="$today" GENERATED_AT="$generated_at" BASE_SHA="$base_sha" node - <<'NODE'
          const fs = require('fs');
          const { getVerificationProposalState } = require('./scripts/prepare-status-update');
          const status = JSON.parse(fs.readFileSync('site/src/app/statusData.json', 'utf8'));
          const proposal = getVerificationProposalState(status, { date: process.env.TODAY });
          const ready = process.env.MODE !== 'verified' || proposal.ready;
          const branch = process.env.MODE === 'verified'
              ? process.env.DAILY_BRANCH
              : `fix/status-${process.env.MODE}-${process.env.TODAY}-${process.env.GITHUB_RUN_NUMBER}`;
          const title = process.env.MODE === 'verified'
              ? `chore(status): Verify Store v${proposal.targetVersion} on ${process.env.TODAY}`
              : `fix(status): Record ${process.env.MODE} update on ${process.env.TODAY}`;
          const outputs = {
              ready,
              today: process.env.TODAY,
              generated_at: process.env.GENERATED_AT,
              base_sha: process.env.BASE_SHA,
              branch,
              title,
              target_version: proposal.targetVersion,
              verification_version: status.release.verificationVersion,
              base_status: status.summary?.publicStatus || 'unknown'
          };
          fs.appendFileSync(
              process.env.GITHUB_OUTPUT,
              `${Object.entries(outputs).map(([key, value]) => `${key}=${value}`).join('\n')}\n`
          );
          if (!ready) {
              fs.appendFileSync(
                  process.env.GITHUB_STEP_SUMMARY,
                  `Store v${proposal.targetVersion} is already fully verified for ${process.env.TODAY}; no duplicate proposal was prepared.\n`
              );
          }
          NODE

      - name: Prepare canonical status JSON
        if: steps.proposal.outputs.ready == 'true'
        shell: bash
        env:
          TODAY: ${{ steps.proposal.outputs.today }}
          GENERATED_AT: ${{ steps.proposal.outputs.generated_at }}
        run: |
          args=(--mode "$MODE" --date "$TODAY" --generated-at "$GENERATED_AT")
          if [[ "$MODE" != "verified" ]]; then
            args+=(--features "$FEATURES")
            [[ -n "$ISSUE_URL" ]] && args+=(--issue-url "$ISSUE_URL")
            [[ -n "$NOTE" ]] && args+=(--note "$NOTE")
          fi
          node scripts/prepare-status-update.js "${args[@]}"

      - name: Install extension dependencies
        if: steps.proposal.outputs.ready == 'true'
        run: npm ci

      - name: Validate extension and status contract
        if: steps.proposal.outputs.ready == 'true'
        run: npm run ci:verification

      - name: Review complete extension dependency graph
        id: extension-dependency-review
        if: steps.proposal.outputs.ready == 'true'
        continue-on-error: true
        run: npm run audit:high

      - name: Install site dependencies
        if: steps.proposal.outputs.ready == 'true'
        run: npm ci
        working-directory: site

      - name: Build status site
        if: steps.proposal.outputs.ready == 'true'
        run: npm run build
        working-directory: site

      - name: Audit website runtime dependencies
        if: steps.proposal.outputs.ready == 'true'
        run: npm run audit:runtime
        working-directory: site

      - name: Review complete website dependency graph
        id: site-dependency-review
        if: steps.proposal.outputs.ready == 'true'
        continue-on-error: true
        run: npm run audit:high
        working-directory: site

      - name: Verify proposal changes only canonical status data
        if: steps.proposal.outputs.ready == 'true'
        shell: bash
        run: |
          mapfile -t changed_files < <(git diff --name-only)
          if [[ "${#changed_files[@]}" -ne 1 || "${changed_files[0]}" != "site/src/app/statusData.json" ]]; then
            printf 'Unexpected proposal files:\n%s\n' "${changed_files[*]}" >&2
            exit 1
          fi
          git diff --check

      - name: Record complete dependency review warning
        if: >-
          steps.extension-dependency-review.outcome == 'failure' ||
          steps.site-dependency-review.outcome == 'failure'
        shell: bash
        run: |
          echo "::warning::The complete dependency review needs maintainer attention."
          echo "A complete dependency audit did not pass. The proposal may still be opened, but required CI will keep it blocked until every high-severity finding or operational audit failure is resolved." >> "$GITHUB_STEP_SUMMARY"

  publish-proposal:
    name: Publish maintainer approval proposal
    needs: validate-proposal
    if: needs.validate-proposal.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: write
      pull-requests: write
    env:
      MODE: ${{ github.event.inputs.mode || 'verified' }}
      FEATURES: ${{ github.event.inputs.features || '' }}
      ISSUE_URL: ${{ github.event.inputs.issue_url || '' }}
      NOTE: ${{ github.event.inputs.note || '' }}
      DAILY_BRANCH: chore/status-daily-verification

    steps:
      - name: Close superseded daily PR after today's verification
        if: needs.validate-proposal.outputs.ready != 'true' && env.MODE == 'verified'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_number="$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --head "$DAILY_BRANCH" --json number --jq '.[0].number // empty')"
          if [[ -n "$pr_number" ]]; then
            gh pr close "$pr_number" --repo "$GITHUB_REPOSITORY" --comment "Closed automatically because the recorded Store build is already fully verified for today."
          fi

      - name: Check out main for publishing
        if: needs.validate-proposal.outputs.ready == 'true'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js for canonical status generation
        if: needs.validate-proposal.outputs.ready == 'true'
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.x

      - name: Prepare validated canonical status JSON
        if: needs.validate-proposal.outputs.ready == 'true'
        shell: bash
        env:
          TODAY: ${{ needs.validate-proposal.outputs.today }}
          GENERATED_AT: ${{ needs.validate-proposal.outputs.generated_at }}
        run: |
          args=(--mode "$MODE" --date "$TODAY" --generated-at "$GENERATED_AT")
          if [[ "$MODE" != "verified" ]]; then
            args+=(--features "$FEATURES")
            [[ -n "$ISSUE_URL" ]] && args+=(--issue-url "$ISSUE_URL")
            [[ -n "$NOTE" ]] && args+=(--note "$NOTE")
          fi
          node scripts/prepare-status-update.js "${args[@]}"

      - name: Push or refresh proposal branch
        id: publish-branch
        if: needs.validate-proposal.outputs.ready == 'true'
        shell: bash
        env:
          BRANCH: ${{ needs.validate-proposal.outputs.branch }}
          TITLE: ${{ needs.validate-proposal.outputs.title }}
          BASE_SHA: ${{ needs.validate-proposal.outputs.base_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          if [[ "$(git rev-parse origin/main)" != "$BASE_SHA" ]]; then
            echo "main changed while this proposal was being validated; aborting instead of publishing stale status data" >&2
            exit 1
          fi
          git fetch origin "$BRANCH:refs/remotes/origin/$BRANCH" || true
          git switch -C "$BRANCH" origin/main
          mapfile -t changed_files < <(git diff --name-only)
          if [[ "${#changed_files[@]}" -ne 1 || "${changed_files[0]}" != "site/src/app/statusData.json" ]]; then
            printf 'Refusing to publish unexpected files:\n%s\n' "${changed_files[*]}" >&2
            exit 1
          fi
          git diff --check
          git add site/src/app/statusData.json
          git commit -m "$TITLE"
          if [[ "$MODE" == "verified" ]]; then
            git push --force-with-lease --set-upstream origin "$BRANCH"
          else
            git push --set-upstream origin "$BRANCH"
          fi
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Open or refresh maintainer approval PR
        if: needs.validate-proposal.outputs.ready == 'true'
        shell: bash
        env:
          BRANCH: ${{ needs.validate-proposal.outputs.branch }}
          TITLE: ${{ needs.validate-proposal.outputs.title }}
          TODAY: ${{ needs.validate-proposal.outputs.today }}
          TARGET_VERSION: ${{ needs.validate-proposal.outputs.target_version }}
          VERIFICATION_VERSION: ${{ needs.validate-proposal.outputs.verification_version }}
          BASE_STATUS: ${{ needs.validate-proposal.outputs.base_status }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$MODE" == "verified" ]]; then
            if [[ "$BASE_STATUS" != "maintainer_verified" || "$VERIFICATION_VERSION" != "$TARGET_VERSION" ]]; then
              recovery_note="The current public status is **${BASE_STATUS}** and its recorded verification build is v${VERIFICATION_VERSION}. Merging this PR declares the current Store build fully verified and resolves any superseded yellow status only after every check below passes."
            else
              recovery_note="The current public status is already verified for v${TARGET_VERSION}; this proposal records a fresh daily verification only after every check below passes."
            fi
            cat > "$RUNNER_TEMP/pr-body.md" <<EOF
          ## Daily verification — ${TODAY}

          **Target Chrome Web Store build: v${TARGET_VERSION}**

          ${recovery_note}

          Until this PR is merged, the website and popup keep showing the latest previously merged status.

          - [ ] I tested the extension installed from the Chrome Web Store, not an unpacked development build.
          - [ ] GH-POPUP-001 — the popup opens, reports v${TARGET_VERSION}, and persists toggle changes.
          - [ ] Sender-side and story-owner confirmation used only authorized test accounts.

          - [ ] GH-IG-SEEN-001
          - [ ] GH-IG-TYPING-001
          - [ ] GH-IG-STORY-001
          - [ ] GH-MSG-SEEN-001
          - [ ] GH-MSG-TYPING-001
          - [ ] GH-MSG-STORY-001
          - [ ] GH-MSG-REQUESTS-001 still loads normally
          - [ ] GH-FB-SEEN-001
          - [ ] GH-FB-TYPING-001
          - [ ] GH-FB-STORY-001
          - [ ] GH-FB-LOCAL-READ-001 preserves unread state without breaking normal chat behavior
          - [ ] GH-FB-GROUP-SEND-001 sends a group-chat message normally
          - [ ] GH-FB-MEDIA-001 still plays normally

          Merging is the maintainer attestation that Store build v${TARGET_VERSION} passed this full checklist. Automated checks do not independently prove live Meta behavior, and this workflow never auto-checks or auto-merges.
          EOF
          else
            cat > "$RUNNER_TEMP/pr-body.md" <<EOF
          ## Public status update — ${TODAY}

          This PR proposes a yellow **${MODE}** update for: ${FEATURES}.

          - [ ] The affected feature ids are correct.
          - [ ] The description is accurate and contains no private messages, credentials, names, or account-sensitive details.
          - [ ] The update should be visible to users after merge and deployment.

          Merging publishes this update to the website and popup status feed. This workflow never auto-merges.
          EOF
          fi

          pr_number="$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --head "$BRANCH" --json number --jq '.[0].number // empty')"
          if [[ -n "$pr_number" ]]; then
            gh pr edit "$pr_number" --repo "$GITHUB_REPOSITORY" --title "$TITLE" --body-file "$RUNNER_TEMP/pr-body.md"
            if [[ "$(gh pr view "$pr_number" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)" == "true" ]]; then
              gh pr ready "$pr_number" --repo "$GITHUB_REPOSITORY"
            fi
          else
            gh pr create --repo "$GITHUB_REPOSITORY" --base main --head "$BRANCH" --title "$TITLE" --body-file "$RUNNER_TEMP/pr-body.md"
          fi

      - name: Approve required pull-request CI for the proposal commit
        if: needs.validate-proposal.outputs.ready == 'true'
        shell: bash
        env:
          BRANCH: ${{ needs.validate-proposal.outputs.branch }}
          HEAD_SHA: ${{ steps.publish-branch.outputs.head_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          for _ in {1..20}; do
            run_id="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow ci.yml --branch "$BRANCH" --event pull_request --limit 20 --json databaseId,headSha --jq ".[] | select(.headSha == \"$HEAD_SHA\") | .databaseId" | head -n 1)"
            if [[ -n "$run_id" ]]; then
              conclusion="$(gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --json conclusion --jq '.conclusion // ""')"
              if [[ "$conclusion" == "action_required" ]]; then
                gh api --method POST "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/approve"
                echo "Required pull-request CI approved for $HEAD_SHA: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${run_id}" >> "$GITHUB_STEP_SUMMARY"
              else
                echo "Required pull-request CI already started for $HEAD_SHA: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${run_id}" >> "$GITHUB_STEP_SUMMARY"
              fi
              exit 0
            fi
            sleep 3
          done
          echo "Approval-required pull-request CI was not found for proposal commit $HEAD_SHA." >&2
          exit 1

  block-stale-proposal:
    name: Block stale proposal after validation failure
    needs: validate-proposal
    if: >-
      always() &&
      needs.validate-proposal.result == 'failure' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.mode == 'verified')
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    env:
      DAILY_BRANCH: chore/status-daily-verification

    steps:
      - name: Mark any stale daily proposal as draft
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_number="$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --head "$DAILY_BRANCH" --json number --jq '.[0].number // empty')"
          if [[ -n "$pr_number" ]]; then
            if [[ "$(gh pr view "$pr_number" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)" != "true" ]]; then
              gh pr ready "$pr_number" --repo "$GITHUB_REPOSITORY" --undo
            fi
            gh pr comment "$pr_number" --repo "$GITHUB_REPOSITORY" --body "Today's proposal refresh failed validation and this PR may be stale, so it was returned to draft. Review the failed workflow run before using it: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi
